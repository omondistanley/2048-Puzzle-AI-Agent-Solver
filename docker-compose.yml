services:
  # Full production build (single container)
  app:
    build: .
    ports:
      - "${APP_PORT:-8000}:8000"
    profiles: ["prod"]

  # Backend dev server (with hot-reload)
  backend:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    command: >
      sh -c "pip install -q -r backend/requirements.txt &&
             uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload"
    profiles: ["dev"]

  # Frontend dev server (Vite HMR)
  frontend:
    image: node:20-alpine
    working_dir: /app/frontend
    volumes:
      - ./frontend:/app/frontend
      - /app/frontend/node_modules
    ports:
      - "5173:5173"
    command: npm run dev -- --host
    environment:
      - VITE_API_URL=http://localhost:8000
    profiles: ["dev"]
